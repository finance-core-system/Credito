spring:
  application:
    name: customer-service

credito:
  security:
    resource-server:
      audiences:
        - credito-api
        - credito-admin-api
        - credito-internal-api
      issuers:
        - issuer-uri: ${CUSTOMER_REALM_ISSUER_URI}
          jwk-set-uri: ${CUSTOMER_REALM_JWK_SET_URI}
        - issuer-uri: ${CUSTOMER_REALM_INTERNAL_ISSUER_URI}
          jwk-set-uri: ${CUSTOMER_REALM_INTERNAL_JWK_SET_URI}
        - issuer-uri: ${ADMIN_REALM_ISSUER_URI}
          jwk-set-uri: ${ADMIN_REALM_JWK_SET_URI}
        - issuer-uri: ${ADMIN_REALM_INTERNAL_ISSUER_URI}
          jwk-set-uri: ${ADMIN_REALM_INTERNAL_JWK_SET_URI}
        - issuer-uri: ${SYSTEM_REALM_ISSUER_URI}
          jwk-set-uri: ${SYSTEM_REALM_JWK_SET_URI}
        - issuer-uri: ${SYSTEM_REALM_INTERNAL_ISSUER_URI}
          jwk-set-uri: ${SYSTEM_REALM_INTERNAL_JWK_SET_URI}
      service-token:
        allowed-issuers:
          - ${SYSTEM_REALM_ISSUER_URI}
          - ${SYSTEM_REALM_INTERNAL_ISSUER_URI}
        allowed-audiences:
          - credito-internal-api
        rules:
          - path-pattern: /api/customers/**
            allowed-client-ids:
              - gateway-service
              - account-service
              - lending-service
            required-scopes:
              - customers.read

server:
  port: ${SERVER_PORT}
  ssl:
    enabled: ${MTLS_ENABLED}
    key-store: ${MTLS_KEY_STORE}
    key-store-password: ${MTLS_KEY_STORE_PASSWORD}
    key-store-type: ${MTLS_KEY_STORE_TYPE}
    trust-store: ${MTLS_TRUST_STORE}
    trust-store-password: ${MTLS_TRUST_STORE_PASSWORD}
    trust-store-type: ${MTLS_TRUST_STORE_TYPE}
    client-auth: ${MTLS_CLIENT_AUTH}

management:
  endpoints:
    web:
      exposure:
        include: health,info
