services:
  gateway-service:
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.keyStore=/etc/credito/mtls/gateway-service/gateway-service.p12
        -Djavax.net.ssl.keyStorePassword=${MTLS_STORE_PASSWORD:?MTLS_STORE_PASSWORD is required}
        -Djavax.net.ssl.trustStore=/etc/credito/mtls/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${MTLS_STORE_PASSWORD:?MTLS_STORE_PASSWORD is required}

  customer-service:
