spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: customer-service-route
              uri: http://customer-service:${CUSTOMER_SERVICE_PORT}
              predicates:
                - Path=/api/customers/**
            - id: account-service-route
              uri: http://account-service:${ACCOUNT_SERVICE_PORT}
              predicates:
                - Path=/api/accounts/**
            - id: lending-service-route
              uri: http://lending-service:${LENDING_SERVICE_PORT}
              predicates:
                - Path=/api/lendings/**
            - id: batch-service-route
              uri: http://batch-service:${BATCH_SERVICE_PORT}
              predicates:
                - Path=/api/batch/**
  security:
    user:
      name: ${MANAGEMENT_USERNAME}
      password: ${MANAGEMENT_PASSWORD}

credito:
  security:
    resource-server:
      audiences:
        - credito-api
        - credito-admin-api
      issuers:
        - issuer-uri: ${CUSTOMER_REALM_ISSUER_URI}
          jwk-set-uri: ${CUSTOMER_REALM_JWK_SET_URI}
        - issuer-uri: ${CUSTOMER_REALM_INTERNAL_ISSUER_URI}
          jwk-set-uri: ${CUSTOMER_REALM_INTERNAL_JWK_SET_URI}
        - issuer-uri: ${ADMIN_REALM_ISSUER_URI}
          jwk-set-uri: ${ADMIN_REALM_JWK_SET_URI}
        - issuer-uri: ${ADMIN_REALM_INTERNAL_ISSUER_URI}
          jwk-set-uri: ${ADMIN_REALM_INTERNAL_JWK_SET_URI}

server:
  port: ${SERVER_PORT}
  forward-headers-strategy: framework

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT}
  endpoints:
    web:
      exposure:
        include: health,info,gateway
