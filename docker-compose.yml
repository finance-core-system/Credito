x-resource-server-env: &resource-server-env
  CUSTOMER_REALM_ISSUER_URI: ${CUSTOMER_REALM_ISSUER_URI:?CUSTOMER_REALM_ISSUER_URI is required}
  CUSTOMER_REALM_JWK_SET_URI: ${CUSTOMER_REALM_JWK_SET_URI:?CUSTOMER_REALM_JWK_SET_URI is required}
  CUSTOMER_REALM_INTERNAL_ISSUER_URI: ${CUSTOMER_REALM_INTERNAL_ISSUER_URI:?CUSTOMER_REALM_INTERNAL_ISSUER_URI is required}
  CUSTOMER_REALM_INTERNAL_JWK_SET_URI: ${CUSTOMER_REALM_INTERNAL_JWK_SET_URI:?CUSTOMER_REALM_INTERNAL_JWK_SET_URI is required}
  ADMIN_REALM_ISSUER_URI: ${ADMIN_REALM_ISSUER_URI:?ADMIN_REALM_ISSUER_URI is required}
  ADMIN_REALM_JWK_SET_URI: ${ADMIN_REALM_JWK_SET_URI:?ADMIN_REALM_JWK_SET_URI is required}
  ADMIN_REALM_INTERNAL_ISSUER_URI: ${ADMIN_REALM_INTERNAL_ISSUER_URI:?ADMIN_REALM_INTERNAL_ISSUER_URI is required}
  ADMIN_REALM_INTERNAL_JWK_SET_URI: ${ADMIN_REALM_INTERNAL_JWK_SET_URI:?ADMIN_REALM_INTERNAL_JWK_SET_URI is required}
  SYSTEM_REALM_ISSUER_URI: ${SYSTEM_REALM_ISSUER_URI:?SYSTEM_REALM_ISSUER_URI is required}
  SYSTEM_REALM_JWK_SET_URI: ${SYSTEM_REALM_JWK_SET_URI:?SYSTEM_REALM_JWK_SET_URI is required}
  SYSTEM_REALM_INTERNAL_ISSUER_URI: ${SYSTEM_REALM_INTERNAL_ISSUER_URI:?SYSTEM_REALM_INTERNAL_ISSUER_URI is required}
  SYSTEM_REALM_INTERNAL_JWK_SET_URI: ${SYSTEM_REALM_INTERNAL_JWK_SET_URI:?SYSTEM_REALM_INTERNAL_JWK_SET_URI is required}

x-mtls-env: &mtls-env
  MTLS_ENABLED: ${MTLS_ENABLED:-true}
  MTLS_KEY_STORE_PASSWORD: ${MTLS_STORE_PASSWORD:-changeit}
  MTLS_KEY_STORE_TYPE: PKCS12
  MTLS_TRUST_STORE: /etc/credito/mtls/truststore.p12
  MTLS_TRUST_STORE_PASSWORD: ${MTLS_STORE_PASSWORD:-changeit}
  MTLS_TRUST_STORE_TYPE: PKCS12
  MTLS_CLIENT_AUTH: ${MTLS_CLIENT_AUTH:-need}

services:
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: credito-gateway-service
    depends_on:
      keycloak:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      lending-service:
        condition: service_healthy
      batch-service:
        condition: service_healthy
    environment:
      <<: [*resource-server-env, *mtls-env]
      SERVER_PORT: ${GATEWAY_SERVER_PORT}
      CUSTOMER_SERVICE_PORT: ${CUSTOMER_SERVICE_PORT}
      ACCOUNT_SERVICE_PORT: ${ACCOUNT_SERVICE_PORT}
      LENDING_SERVICE_PORT: ${LENDING_SERVICE_PORT}
      BATCH_SERVICE_PORT: ${BATCH_SERVICE_PORT}
      INTERNAL_SERVICE_SCHEME: ${INTERNAL_SERVICE_SCHEME:-https}
      MANAGEMENT_SERVER_PORT: ${MANAGEMENT_SERVER_PORT}
      MANAGEMENT_USERNAME: ${MANAGEMENT_USERNAME:?MANAGEMENT_USERNAME is required}
      MANAGEMENT_PASSWORD: ${MANAGEMENT_PASSWORD:?MANAGEMENT_PASSWORD is required}
      MTLS_KEY_STORE: /etc/credito/mtls/gateway-service/gateway-service.p12
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.keyStore=/etc/credito/mtls/gateway-service/gateway-service.p12
        -Djavax.net.ssl.keyStorePassword=${MTLS_STORE_PASSWORD:-changeit}
        -Djavax.net.ssl.trustStore=/etc/credito/mtls/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${MTLS_STORE_PASSWORD:-changeit}
    volumes:
      - ./infra/mtls/generated/truststore.p12:/etc/credito/mtls/truststore.p12:ro
      - ./infra/mtls/generated/gateway-service/gateway-service.p12:/etc/credito/mtls/gateway-service/gateway-service.p12:ro
    ports:
      - "${GATEWAY_PUBLIC_PORT}:${GATEWAY_SERVER_PORT}"
    networks:
      - public-net
      - internal-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: credito-keycloak
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        import_realm() {
          realm_name="$${1}"
          realm_file="/opt/keycloak/data/import/$${realm_name}.json"
          echo "Importing Keycloak realm: $${realm_name}"
          if /opt/keycloak/bin/kc.sh import --file "$${realm_file}" --override false; then
            echo "Imported Keycloak realm: $${realm_name}"
          else
            echo "Failed to import Keycloak realm: $${realm_name}" >&2
            exit 1
          fi
        }
        import_realm customer-realm
        import_realm admin-realm
        import_realm system-realm
        exec /opt/keycloak/bin/kc.sh start-dev
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      KC_DB: mysql
      KC_DB_URL_HOST: ${KC_DB_URL_HOST:?KC_DB_URL_HOST is required}
      KC_DB_URL_PORT: ${KC_DB_URL_PORT:?KC_DB_URL_PORT is required}
      KC_DB_URL_DATABASE: ${KC_DB_URL_DATABASE:?KC_DB_URL_DATABASE is required}
      KC_DB_USERNAME: ${KC_DB_USERNAME:?KC_DB_USERNAME is required}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:?KC_BOOTSTRAP_ADMIN_USERNAME is required}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_BOOTSTRAP_ADMIN_PASSWORD is required}
      KC_HTTP_PORT: ${KEYCLOAK_SERVER_PORT}
    volumes:
      - ./infra/keycloak/import:/opt/keycloak/data/import:ro
    ports:
      - "${KEYCLOAK_PUBLIC_PORT}:${KEYCLOAK_SERVER_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/${KEYCLOAK_SERVER_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - public-net
      - data-net

  customer-service:
    build:
      context: .
      dockerfile: customer-service/Dockerfile
    container_name: credito-customer-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*resource-server-env, *mtls-env]
      SERVER_PORT: ${CUSTOMER_SERVICE_PORT}
      MTLS_KEY_STORE: /etc/credito/mtls/customer-service/customer-service.p12
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.keyStore=/etc/credito/mtls/customer-service/customer-service.p12
        -Djavax.net.ssl.keyStorePassword=${MTLS_STORE_PASSWORD:-changeit}
        -Djavax.net.ssl.trustStore=/etc/credito/mtls/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${MTLS_STORE_PASSWORD:-changeit}
    volumes:
      - ./infra/mtls/generated/truststore.p12:/etc/credito/mtls/truststore.p12:ro
      - ./infra/mtls/generated/customer-service/customer-service.p12:/etc/credito/mtls/customer-service/customer-service.p12:ro
    expose:
      - "${CUSTOMER_SERVICE_PORT}"
    networks:
      - internal-net
      - data-net

  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: credito-account-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*resource-server-env, *mtls-env]
      SERVER_PORT: ${ACCOUNT_SERVICE_PORT}
      MTLS_KEY_STORE: /etc/credito/mtls/account-service/account-service.p12
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.keyStore=/etc/credito/mtls/account-service/account-service.p12
        -Djavax.net.ssl.keyStorePassword=${MTLS_STORE_PASSWORD:-changeit}
        -Djavax.net.ssl.trustStore=/etc/credito/mtls/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${MTLS_STORE_PASSWORD:-changeit}
    volumes:
      - ./infra/mtls/generated/truststore.p12:/etc/credito/mtls/truststore.p12:ro
      - ./infra/mtls/generated/account-service/account-service.p12:/etc/credito/mtls/account-service/account-service.p12:ro
    expose:
      - "${ACCOUNT_SERVICE_PORT}"
    networks:
      - internal-net
      - data-net

  lending-service:
    build:
      context: .
      dockerfile: lending-service/Dockerfile
    container_name: credito-lending-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*resource-server-env, *mtls-env]
      SERVER_PORT: ${LENDING_SERVICE_PORT}
      MTLS_KEY_STORE: /etc/credito/mtls/lending-service/lending-service.p12
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.keyStore=/etc/credito/mtls/lending-service/lending-service.p12
        -Djavax.net.ssl.keyStorePassword=${MTLS_STORE_PASSWORD:-changeit}
        -Djavax.net.ssl.trustStore=/etc/credito/mtls/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${MTLS_STORE_PASSWORD:-changeit}
    volumes:
      - ./infra/mtls/generated/truststore.p12:/etc/credito/mtls/truststore.p12:ro
      - ./infra/mtls/generated/lending-service/lending-service.p12:/etc/credito/mtls/lending-service/lending-service.p12:ro
    expose:
      - "${LENDING_SERVICE_PORT}"
    networks:
      - internal-net
      - data-net

  batch-service:
    build:
      context: .
      dockerfile: batch-service/Dockerfile
    container_name: credito-batch-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*resource-server-env, *mtls-env]
      SERVER_PORT: ${BATCH_SERVICE_PORT}
      MTLS_KEY_STORE: /etc/credito/mtls/batch-service/batch-service.p12
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.keyStore=/etc/credito/mtls/batch-service/batch-service.p12
        -Djavax.net.ssl.keyStorePassword=${MTLS_STORE_PASSWORD:-changeit}
        -Djavax.net.ssl.trustStore=/etc/credito/mtls/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${MTLS_STORE_PASSWORD:-changeit}
    volumes:
      - ./infra/mtls/generated/truststore.p12:/etc/credito/mtls/truststore.p12:ro
      - ./infra/mtls/generated/batch-service/batch-service.p12:/etc/credito/mtls/batch-service/batch-service.p12:ro
    expose:
      - "${BATCH_SERVICE_PORT}"
    networks:
      - internal-net
      - data-net

  mysql:
    build:
      context: ./infra/mysql
      dockerfile: Dockerfile
    container_name: credito-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      KC_DB_URL_DATABASE: ${KC_DB_URL_DATABASE:?KC_DB_URL_DATABASE is required}
      KC_DB_USERNAME: ${KC_DB_USERNAME:?KC_DB_USERNAME is required}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - data-net

  redis:
    image: redis:7.4
    container_name: credito-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - data-net

networks:
  public-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true
  data-net:
    driver: bridge
    internal: true

volumes:
  mysql-data:
  redis-data:
